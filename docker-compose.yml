services:
  macos:
    build: .
    container_name: macos

    stdin_open: true
    tty: true
    privileged: true

    devices:
      - /dev/kvm

    ports:
      - "50922:10022"

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - macos_data:/home/arch/OSX

    environment:
      DISPLAY: ${DISPLAY:-:0.0}
      GENERATE_UNIQUE: "true"
      MASTER_PLIST_URL: "https://raw.githubusercontent.com/sickcodes/osx-serial-generator/master/config-custom.plist"
      SHORTNAME: "ventura"

      RAM: "8"
      SMP: "4"
      EXTRA: "-cpu host"

    dns:
      - 8.8.8.8
      - 1.1.1.1

    restart: unless-stopped

volumes:
  macos_data: